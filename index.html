<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
        }

        header {
            background: #333;
            color: white;
            padding: 15px;
        }

        main {
            padding: 40px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        footer {
            background: #333;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>

<header>
    <h1>My First Website</h1>
</header>

<main>
    <h2>Welcome!</h2>
    <p>This is a very simple website made with HTML and CSS.</p>

    <img src="https://via.placeholder.com/300" alt="Sample Image">

    <br><br>

    <button onclick="alert('Hello! Thanks for visiting.')">
        Click Me
    </button>
</main>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
